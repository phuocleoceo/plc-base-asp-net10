version: "3.9"

services:
  redis:
    image: redis
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - plc-redis-data:/data

  mysql:
    image: mysql
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "@dmin1234"
    ports:
      - "3306:3306"
    volumes:
      - plc-mysql-data:/var/lib/mysql

  plc-service:
    image: plc-service
    container_name: plc-service
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - "SelectedDatabase=Local"
      - "ConnectionStrings:Local=server=plc-mysql; port=3306; database=plcCapstone; user=root; password=@dmin1234; Persist Security Info=False; Connect Timeout=300"
      - "CacheSettings:ConnectionString=plc-redis:6379"
    depends_on:
      - plc-redis
      - plc-mysql
    ports:
      - "7133:80"

volumes:
  plc-redis-data:
  plc-mysql-data:
